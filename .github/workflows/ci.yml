name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: |
          for attempt in 1 2 3; do
            npm ci --legacy-peer-deps --ignore-scripts && exit 0
            echo "npm ci failed (attempt ${attempt}/3), retrying in 10s..."
            sleep 10
          done
          exit 1
      - name: Audit
        run: npm audit --audit-level=moderate
      - name: Verify npm signatures
        run: npm audit signatures
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build
      - name: Bundle
        run: npm run bundle:min
      - name: Test
        run: npm run test:ci
      - name: Verify package contents
        run: npm pack --dry-run
